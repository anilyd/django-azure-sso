<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Azure AD Django{% endblock %}</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; color: #333; }
        .navbar { background: #0078d4; color: white; padding: 14px 30px; display: flex; justify-content: space-between; align-items: center; }
        .navbar a { color: white; text-decoration: none; margin-left: 16px; font-weight: 500; }
        .container { max-width: 900px; margin: 40px auto; padding: 0 20px; }
        .card { background: white; border-radius: 10px; padding: 30px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
        .btn { display: inline-block; padding: 10px 22px; border-radius: 6px; text-decoration: none; font-weight: 600; cursor: pointer; border: none; }
        .btn-primary { background: #0078d4; color: white; }
        .btn-danger { background: #d93025; color: white; }
        .btn:hover { opacity: 0.9; }
    </style>
</head>
<body>
    <nav class="navbar">
        <span>🔷 Azure AD Django App</span>
        <div>
            {% if user.is_authenticated %}
                <span>👤 {{ user.full_name }}</span>
                <a href="{% url 'azure_logout' %}" class="btn btn-danger" style="margin-left:16px">Logout</a>
            {% endif %}
        </div>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
